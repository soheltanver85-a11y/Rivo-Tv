<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Classic Style</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --fire: #ff4500; 
            --telegram: #0088cc;
            --refresh: #00ff88;
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        
        .video-box { 
            background: #000; 
            border-bottom: 2px solid var(--primary); 
            position: relative; 
            overflow: hidden; 
            width: 100%;
            aspect-ratio: 16/9; 
        }
        
        .video-js { width: 100% !important; height: 100% !important; }
        .video-js .vjs-tech { object-fit: contain !important; }

        /* Fullscreen adjustment */
        .vjs-fullscreen .fixed-top-container, 
        .vjs-fullscreen .grid, 
        .vjs-fullscreen .footer-area { display: none !important; }
        .vjs-loading-spinner { display: none !important; }

        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 2147483647; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 15px; 
            border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 2147483647; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 15px; }
        #bri-indicator { left: 15px; }

        /* Notice & Header */
        .notice-board { background: #111; border-bottom: 1px solid #222; overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 10px; color: #999; }
        .notice-text a { color: var(--primary); text-decoration: none; font-weight: 800; font-family: 'Orbitron', sans-serif; border: 1px solid var(--primary); padding: 0 5px; border-radius: 3px; margin-left: 5px; text-transform: uppercase; font-size: 9px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: #080808; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .action-row { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
        .action-btn { padding: 4px 8px; background: #1a1a1a; border-radius: 5px; border: 1px solid #333; color: #bbb; font-size: 9px; cursor: pointer; text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .btn-refresh { color: var(--refresh); border-color: var(--refresh); }

        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { width: 100%; padding: 6px 12px; background: #121212; border: 1px solid #222; border-radius: 6px; color: #fff; font-size: 11px; outline: none; }

        .cat-row { display: flex; gap: 6px; overflow-x: auto; padding: 7px 10px; scrollbar-width: none; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .cat-pill { padding: 4px 12px; background: #1a1a1a; border-radius: 5px; font-size: 10px; color: #aaa; white-space: nowrap; cursor: pointer; border: 1px solid #333; }
        .cat-pill.active { background: rgba(0, 242, 255, 0.15); color: var(--primary); border-color: var(--primary); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        
        .logo-area { height: 85px; background: #000; display: flex; align-items: center; justify-content: center; padding: 12px; position: relative; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; transition: 0.3s; }
        
        /* New: Favorite Star */
        .fav-star { position: absolute; top: 5px; right: 5px; color: rgba(255,255,255,0.3); font-size: 14px; z-index: 10; transition: 0.3s; }
        .fav-star.active { color: #FFD700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }

        /* New: Preview Video Style */
        .preview-vid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; background: #000; }
        .card.playing-preview img { opacity: 0; }
        .card.playing-preview .preview-vid { display: block; }

        .ch-info { padding: 6px; background: #0d0d0d; border-top: 1px solid #1a1a1a; cursor: pointer; text-align: center; }
        .ch-name { font-size: 10px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; padding: 2px 0; }
        .ch-name:active { color: var(--primary); }

        .footer-area { padding: 12px 0; text-align: center; border-top: 1px solid #1a1a1a; margin-top: 10px; background: #080808; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 800; color: #777; }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">
            📢 𝚂𝚞𝚙𝚙𝚘𝚛𝚝 𝙲𝚎𝚗𝚝𝚎𝚛: 🛠️ বাফারিং হচ্ছে? 📡 নতুন চ্যানেল প্রয়োজন? ⚡ দ্রুত সমাধান পেতে এখনই যুক্ত হোন 
            <a href="https://t.me/techbd_group" target="_blank">𝚃𝚎𝚌𝚑 𝙱𝙳</a>
        </div>
    </div>

    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div class="action-row">
            <button class="action-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i> Share</button>
            <button class="action-btn btn-refresh" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <a href="https://t.me/techbd_group" target="_blank" class="action-btn"><i class="fab fa-telegram"></i> Contact</a>
        </div>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)">★ Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid">Loading...</div>

<div class="footer-area">
    <div class="dev-name">Developed By Sohel Tanvir</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer;
    let currentCategory = 'ALL';

    async function init() {
        mainPlayer = videojs('rivo-player', { 
            fluid: true, 
            aspectRatio: '16:9', 
            userActions: { click: false } 
        });
        
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("M3U Load Error"); }
    }

    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        }, {passive: true});

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        }, {passive: true});

        wrapper.addEventListener('touchend', () => {
            if (!isMoving) {
                if (mainPlayer.paused()) mainPlayer.play();
                else mainPlayer.pause();
            }
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                // ক্যাটাগরি ডিটেকশন (যদি M3U তে থাকে)
                item.cat = l.match(/group-title="(.*?)"/)?.[1] || "Bangla";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.length === 0 ? "<div style='grid-column: 1/-1; text-align:center; padding:20px; color:#555;'>No Channels Found</div>" : 
        list.map(ch => {
            const isFav = favorites.includes(ch.url) ? 'active' : '';
            return `
            <div class="card" data-url="${ch.url}">
                <i class="fas fa-star fav-star ${isFav}" onclick="toggleFavorite(event, '${ch.url}')"></i>
                <div class="logo-area" onclick="playMain('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80?text=TV'">
                    <video class="preview-vid" muted playsinline loop>
                        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="ch-info" onclick="triggerPreview(this)">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    // স্টার বাটনের কাজ
    function toggleFavorite(event, url) {
        event.stopPropagation();
        const icon = event.currentTarget;
        const index = favorites.indexOf(url);
        
        if (index > -1) {
            favorites.splice(index, 1);
            icon.classList.remove('active');
        } else {
            favorites.push(url);
            icon.classList.add('active');
        }
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
    }

    // ১০ সেকেন্ডের প্রিভিউ ট্রিমার
    function triggerPreview(infoElement) {
        const card = infoElement.parentElement;
        const vid = card.querySelector('.preview-vid');
        
        card.classList.add('playing-preview');
        vid.play();

        setTimeout(() => {
            vid.pause();
            vid.currentTime = 0;
            card.classList.remove('playing-preview');
        }, 10000); // ১০ সেকেন্ড
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(() => {});
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentCategory = cat;

        if (cat === 'Fav') {
            const favList = allChannels.filter(ch => favorites.includes(ch.url));
            renderChannels(favList);
        } else if (cat === 'ALL') {
            renderChannels(allChannels);
        } else {
            renderChannels(allChannels.filter(ch => ch.cat.toLowerCase().includes(cat.toLowerCase())));
        }
    }

    function liveSearch() {
        const q = document.getElementById("search-input").value.toLowerCase();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(q));
        renderChannels(filtered);
    }

    function shareApp() {
        if (navigator.share) navigator.share({ title: 'Rivo TV', url: window.location.href });
        else alert(window.location.href);
    }

    init();
</script>
</body>
</html>
