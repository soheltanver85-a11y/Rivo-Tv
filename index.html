<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
            /* Gradient Colors */
            --grad-share: linear-gradient(45deg, #6a11cb, #2575fc);
            --grad-refresh: linear-gradient(45deg, #00b09b, #96c93d);
            --grad-tg: linear-gradient(45deg, #0088cc, #00c6ff);
            --grad-apk: linear-gradient(45deg, #f12711, #f5af19);
            --grad-full: linear-gradient(45deg, #00f2ff, #007adf);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .brand-header { padding: 8px 15px; background: #000; border-bottom: 1px solid #1a1a1a; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.9); }
        .video-box { background: #000; border-bottom: 2px solid #00f2ff; position: relative; overflow: hidden; touch-action: none; }
        .video-js { width: 100% !important; aspect-ratio: 16/9; }

        /* Brightness & Volume Indicators */
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 5; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.85); color: #00f2ff; padding: 8px 15px; 
            border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 100; 
            display: none; border: 1px solid #00f2ff; box-shadow: 0 0 15px rgba(0,242,255,0.3);
        }

        /* Notice Board */
        .notice-board { background: #0a0a0a; border-bottom: 1px solid #111; overflow: hidden; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; font-size: 11px; color: #aaa; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- COLORFUL ACTION BUTTONS --- */
        .action-row { 
            display: flex; gap: 8px; padding: 10px; 
            background: #080808; overflow-x: auto; 
            scrollbar-width: none; align-items: center;
        }
        .action-row::-webkit-scrollbar { display: none; }

        .action-btn { 
            padding: 6px 12px; border-radius: 8px; border: none; 
            color: #fff; font-size: 10px; font-weight: 600; 
            cursor: pointer; text-decoration: none; display: flex; 
            align-items: center; gap: 5px; white-space: nowrap; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .action-btn i { font-size: 12px; }
        .action-btn:active { transform: scale(0.92); }

        .btn-share { background: var(--grad-share); }
        .btn-refresh { background: var(--grad-refresh); }
        .btn-contact { background: var(--grad-tg); }
        .btn-apk { background: var(--grad-apk); animation: pulse 2s infinite; }
        .btn-fullscreen { background: var(--grad-full); box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* Search Area */
        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { 
            width: 100%; padding: 8px 15px; background: #151515; 
            border: 1px solid #252525; border-radius: 10px; color: #fff; 
            font-size: 11px; outline: none; border-left: 3px solid #00f2ff;
        }

        /* --- COLORFUL CATEGORY BUTTONS --- */
        .cat-row { 
            display: flex; gap: 8px; overflow-x: auto; 
            padding: 10px; scrollbar-width: none; 
            background: #050505; border-bottom: 1px solid #1a1a1a;
        }
        .cat-pill { 
            padding: 6px 15px; background: #1a1a1a; border-radius: 50px; 
            font-size: 11px; color: #bbb; white-space: nowrap; 
            cursor: pointer; border: 1px solid #333; transition: 0.3s;
            font-weight: 500;
        }
        /* Unique Colors for Each Category */
        .cat-pill[data-cat="ALL"].active { background: var(--grad-full); color: #000; border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .cat-pill[data-cat="Sports"].active { background: var(--grad-apk); color: #fff; border-color: #f5af19; box-shadow: 0 0 15px rgba(245, 175, 25, 0.4); }
        .cat-pill[data-cat="Bangla"].active { background: var(--grad-refresh); color: #fff; border-color: #96c93d; box-shadow: 0 0 15px rgba(150, 201, 61, 0.4); }
        .cat-pill[data-cat="Fav"].active { background: var(--grad-share); color: #fff; border-color: #2575fc; box-shadow: 0 0 15px rgba(37, 117, 252, 0.4); }

        /* Channel Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; }
        .logo-area { height: 90px; background: #000; display: flex; align-items: center; justify-content: center; padding: 12px; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ch-info { padding: 8px; background: #0d0d0d; border-top: 1px solid #1a1a1a; text-align: center; }
        .ch-name { font-size: 10px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .footer-area { padding: 20px 0; text-align: center; background: #080808; border-top: 1px solid #111; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 800; color: #00f2ff; letter-spacing: 1px; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-name">RIVO TV</div>
</div>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">📢 বাফারিং ছাড়াই লাইভ টিভি উপভোগ করুন! যেকোনো সমস্যায় আমাদের টেলিগ্রামে জানান।</div>
    </div>

    <div class="action-row">
        <button class="action-btn btn-share" onclick="shareApp()"><i class="fas fa-share-nodes"></i> Share</button>
        <button class="action-btn btn-refresh" onclick="location.reload()"><i class="fas fa-rotate"></i> Refresh</button>
        <a href="https://t.me/techbd_group" target="_blank" class="action-btn btn-contact"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://www.mediafire.com/file/wm4p7mwuk2geuim/Rivo_Tv_1.0.0.apk/file" target="_blank" class="action-btn btn-apk"><i class="fas fa-download"></i> Get App</a>
        <button class="action-btn btn-fullscreen" onclick="goFullscreen()"><i class="fas fa-expand"></i> Fullscreen</button>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="আপনার পছন্দের চ্যানেলটি খুঁজুন..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" data-cat="ALL" onclick="filterCat('ALL', this)">All Channels</div>
        <div class="cat-pill" data-cat="Sports" onclick="filterCat('Sports', this)">🔥 Sports</div>
        <div class="cat-pill" data-cat="Bangla" onclick="filterCat('Bangla', this)">🇧🇩 Bangla</div>
        <div class="cat-pill" data-cat="Fav" onclick="filterCat('Fav', this)">⭐ Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid"></div>

<div class="footer-area">
    <div style="font-size: 8px; color: #444; margin-bottom: 4px;">DEVELOPED BY</div>
    <div class="dev-name">SOHEL TANVEER</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], mainPlayer;

    async function init() {
        mainPlayer = videojs('rivo-player', { fluid: true, controls: true, userActions: { click: false } });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("Load Error"); }
    }

    function goFullscreen() {
        if (mainPlayer.isFullscreen()) mainPlayer.exitFullscreen();
        else mainPlayer.requestFullscreen();
    }

    function setupGestures() {
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');
        let startY, startVal, isBrightness, isMoving = false;

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        });

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        });

        wrapper.addEventListener('touchend', () => {
            if (!isMoving) {
                if (mainPlayer.paused()) mainPlayer.play();
                else mainPlayer.pause();
            }
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}, list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map(ch => `
            <div class="card" onclick="playMain('${ch.url}')">
                <div class="logo-area">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80x50?text=TV'">
                </div>
                <div class="ch-info">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cat === 'ALL') renderChannels(allChannels);
        else renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase())));
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase();
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
    }

    function shareApp() {
        if (navigator.share) navigator.share({ title: 'Rivo TV', url: window.location.href });
        else alert("URL Copied!");
    }

    init();
</script>
</body>
</html>
