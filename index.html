<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --fire: #ff4500; 
            --telegram: #0088cc;
            --refresh: #00ff88;
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 2000;
            background: var(--bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .top-brand-header {
            background: linear-gradient(to bottom, #111, #050505);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .top-brand-header .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            text-transform: uppercase;
        }

        .video-box { background: #000; border-bottom: 2px solid var(--primary); position: relative; overflow: hidden; touch-action: none; cursor: pointer; }
        .video-js { width: 100% !important; aspect-ratio: 16/10; }
        @media (max-width: 768px) { .video-js { aspect-ratio: 4/3; } }

        /* Gesture indicators */
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 16px; 
            border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 20; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 20px; }
        #bri-indicator { left: 20px; }

        .notice-board { background: #111; border-bottom: 1px solid #222; overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 10px; color: #bbb; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Actions Frame Style */
        .actions-frame { 
            display: flex; 
            gap: 6px; 
            padding: 8px 10px; 
            background: #080808; 
            overflow-x: auto; 
            scrollbar-width: none;
            align-items: center;
        }
        .action-chip { 
            padding: 6px 10px; 
            background: #151515; 
            border-radius: 6px; 
            border: 1px solid #252525; 
            color: #ccc; 
            font-size: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            white-space: nowrap;
            transition: 0.2s;
        }
        .action-chip i { font-size: 11px; }
        .chip-fs { color: var(--primary); border-color: rgba(0, 242, 255, 0.3); }
        .chip-rf { color: var(--refresh); border-color: rgba(0, 255, 136, 0.3); }
        .chip-tg { color: var(--telegram); border-color: rgba(0, 136, 204, 0.3); }
        .chip-apk { color: var(--fire); border-color: rgba(255, 69, 0, 0.3); }

        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { width: 100%; padding: 8px 12px; background: #121212; border: 1px solid #222; border-radius: 6px; color: #fff; font-size: 11px; outline: none; }

        .cat-row { display: flex; gap: 6px; overflow-x: auto; padding: 10px; scrollbar-width: none; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .cat-pill { padding: 5px 12px; background: #1a1a1a; border-radius: 4px; font-size: 10px; color: #aaa; white-space: nowrap; cursor: pointer; border: 1px solid #333; }
        .cat-pill.active { background: rgba(0, 242, 255, 0.15); color: var(--primary); border-color: var(--primary); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        
        .fav-star { 
            position: absolute; top: 6px; right: 6px; z-index: 20; 
            background: rgba(0,0,0,0.6); padding: 5px; border-radius: 50%; 
            display: flex; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .fav-star svg { width: 14px; height: 14px; fill: #555; transition: 0.3s; }
        .fav-star.active svg { fill: #ffcc00; }

        .logo-area { height: 95px; background: #000; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); display: none; z-index: 15; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 10s linear; }

        .ch-info { padding: 10px; background: #0d0d0d; border-top: 1px solid #1a1a1a; cursor: pointer; }
        .ch-name { font-size: 11px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }
        
        .footer-area { padding: 20px 0; text-align: center; border-top: 1px solid #1a1a1a; background: #080808; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 800; color: #555; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="sticky-wrapper">
    <div class="top-brand-header">
        <div class="brand-name">RIVO TV</div>
    </div>

    <div class="video-box" id="player-wrapper" onclick="togglePlayPause()">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">
            📢 বাফারিং হচ্ছে? দ্রুত সমাধান পেতে এখনই যুক্ত হোন আমাদের টেলিগ্রাম গ্রুপে। আপডেট পেতে সাথেই থাকুন।
        </div>
    </div>

    <div class="actions-frame">
        <div class="action-chip chip-fs" onclick="goFullscreen()"><i class="fas fa-expand"></i> Fullscreen</div>
        <div class="action-chip chip-rf" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</div>
        <a href="https://t.me/techbd_group" target="_blank" class="action-chip chip-tg"><i class="fab fa-telegram"></i> Contact</a>
        <a href="https://www.mediafire.com/file/wm4p7mwuk2geuim/Rivo_Tv_1.0.0.apk/file" target="_blank" class="action-chip chip-apk"><i class="fas fa-download"></i> Get App</a>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)">★ Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid">লোড হচ্ছে...</div>

<div class="footer-area">
    <div class="dev-name">Developed By Sohel Tanvir</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer, previewHls = null;
    let currentCategory = 'ALL';

    async function init() {
        mainPlayer = videojs('rivo-player', { 
            fluid: true, 
            userActions: { click: false },
            controlBar: { children: ['playToggle', 'volumePanel', 'currentTimeDisplay', 'timeDivider', 'durationDisplay', 'progressControl', 'fullscreenToggle'] }
        });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url, false);
        } catch (e) { 
            document.getElementById('mainGrid').innerHTML = "লোড ব্যর্থ হয়েছে।";
        }
    }

    // প্লে/পজ ফাংশন
    function togglePlayPause() {
        if (mainPlayer.paused()) mainPlayer.play();
        else mainPlayer.pause();
    }

    function goFullscreen() {
        if (mainPlayer) mainPlayer.requestFullscreen();
    }

    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        }, {passive: true});

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        }, {passive: true});

        wrapper.addEventListener('touchend', () => {
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map((ch, index) => {
            const isFav = favorites.includes(ch.id);
            return `
            <div class="card">
                <div class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${ch.id}')">
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </div>
                <div class="logo-area" id="logo-box-${index}" onclick="playMain('${ch.url}', true)">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80?text=TV'">
                    <div class="progress-container" id="prog-cont-${index}"><div class="progress-bar" id="prog-bar-${index}"></div></div>
                </div>
                <div class="ch-info" onclick="startPreview('${ch.url}', ${index})">
                    <span class="ch-name">▶ ${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    function toggleFav(event, id) {
        event.stopPropagation();
        if (favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
        event.currentTarget.classList.toggle('active');
        if (currentCategory === 'Fav') filterCat('Fav', document.querySelector('.cat-pill.active'));
    }

    function playMain(url, shouldPlay) {
        stopAllPreviews();
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        if(shouldPlay) mainPlayer.play().catch(() => {});
    }

    function startPreview(url, index) {
        stopAllPreviews();
        const container = document.getElementById(`logo-box-${index}`);
        const pCont = document.getElementById(`prog-cont-${index}`);
        const pBar = document.getElementById(`prog-bar-${index}`);
        
        const video = document.createElement('video');
        video.className = 'preview-v';
        video.style.cssText = "position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:10; background:#000;";
        video.muted = true; video.autoplay = true; video.playsinline = true;
        
        container.appendChild(video);
        pCont.style.display = 'block';
        setTimeout(() => { pBar.style.width = '100%'; }, 50);

        if (window.Hls && Hls.isSupported()) {
            previewHls = new Hls();
            previewHls.loadSource(url);
            previewHls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }

        setTimeout(() => stopAllPreviews(), 10000);
    }

    function stopAllPreviews() {
        if (previewHls) { previewHls.destroy(); previewHls = null; }
        document.querySelectorAll('.preview-v').forEach(v => v.remove());
        document.querySelectorAll('.progress-container').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.progress-bar').forEach(b => b.style.width = '0%');
    }

    function filterCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        let filtered = allChannels;
        if (cat === 'Fav') filtered = allChannels.filter(ch => favorites.includes(ch.id));
        else if (cat !== 'ALL') filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase()));
        
        renderChannels(filtered);
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    init();
</script>
</body>
</html>
