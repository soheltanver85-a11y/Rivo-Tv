<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00e5ff; 
            --accent: #ff0055;
            --bg: #0a0a0b; 
            --card-bg: #161618; 
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            overflow-x: hidden; 
            padding-bottom: 50px;
            background: radial-gradient(circle at top right, #1a1a1d, #0a0a0b);
        }

        /* Video Player Styling */
        .fixed-top-container { 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            background: rgba(10, 10, 11, 0.95); 
            backdrop-filter: blur(10px);
            width: 100%; 
        }

        .video-box { 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .video-js { width: 100% !important; aspect-ratio: 16/9; }
        .vjs-big-play-button { background-color: var(--primary) !important; border: none !important; border-radius: 50% !important; width: 60px !important; height: 60px !important; line-height: 60px !important; }

        /* Gesture Indicators */
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            color: var(--primary); padding: 12px 24px; 
            border-radius: 50px; font-size: 14px; font-weight: bold; z-index: 20; 
            display: none; border: 1px solid rgba(0, 229, 255, 0.3);
        }
        #vol-indicator { right: 20px; }
        #bri-indicator { left: 20px; }

        /* Notice Bar */
        .notice-board { background: var(--accent); padding: 6px 0; }
        .notice-text { 
            font-size: 12px; font-weight: 600; color: white;
            display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; 
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Header & Actions */
        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; }
        .brand-name { 
            font-family: 'Orbitron', sans-serif; font-size: 18px; 
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .action-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .action-btn { 
            padding: 8px 14px; background: var(--glass); border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 12px; 
            cursor: pointer; text-decoration: none; transition: 0.3s;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        /* Search */
        .search-area { padding: 0 15px 15px; }
        .search-input { 
            width: 100%; padding: 12px 18px; background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; 
            color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); }

        /* Categories */
        .cat-row { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px 15px; scrollbar-width: none; }
        .cat-pill { 
            padding: 8px 20px; background: var(--glass); border-radius: 30px; 
            font-size: 13px; color: var(--text-dim); white-space: nowrap; cursor: pointer; 
            border: 1px solid transparent; transition: 0.3s;
        }
        .cat-pill.active { background: var(--primary); color: #000; font-weight: 700; }

        /* Grid & Cards */
        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; padding: 15px; 
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; position: relative;
        }
        .card:active { transform: scale(0.96); }

        .logo-area { 
            height: 110px; background: #000; display: flex; 
            align-items: center; justify-content: center; padding: 20px; 
            position: relative; cursor: pointer; 
        }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .ch-info { padding: 12px; background: rgba(255,255,255,0.02); text-align: center; }
        .ch-name { font-size: 12px; font-weight: 600; color: var(--text-main); }

        /* Favorite Star */
        .fav-star { 
            position: absolute; top: 10px; right: 10px; z-index: 20; 
            background: rgba(0,0,0,0.6); border-radius: 50%; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .fav-star i { color: #555; font-size: 14px; transition: 0.3s; }
        .fav-star.active i { color: #ffcc00; transform: scale(1.2); }

        /* Footer */
        .footer-area { padding: 30px 0; text-align: center; opacity: 0.5; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--primary); margin-top: 5px; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); gap: 20px; } }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10;"></div>
        <div id="vol-indicator" class="gesture-indicator"><i class="fas fa-volume-up"></i> 100%</div>
        <div id="bri-indicator" class="gesture-indicator"><i class="fas fa-sun"></i> 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">
            ⚠️ বাফারিং সমস্যা হলে Refresh বাটনে ক্লিক করুন অথবা আমাদের টেলিগ্রাম গ্রুপে জানান — দ্রুত সমাধানের জন্য যুক্ত হোন @TechBD_Group
        </div>
    </div>

    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div class="action-row">
            <button class="action-btn" onclick="shareApp()"><i class="fas fa-share-nodes"></i> Share</button>
            <button class="action-btn" onclick="location.reload()" style="color: #00ff88;"><i class="fas fa-rotate"></i> Refresh</button>
            <a href="https://t.me/techbd_group" target="_blank" class="action-btn" style="color: #0088cc;"><i class="fab fa-telegram"></i> Group</a>
        </div>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ আপনার প্রিয় চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All Channels</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)"><i class="fas fa-star"></i> Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid">
    </div>

<div class="footer-area">
    <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">Developed By</div>
    <div class="dev-name">Sohel Tanvir</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer, previewHls = null;
    let currentCategory = 'ALL';

    async function init() {
        mainPlayer = videojs('rivo-player', { 
            fluid: true, 
            playbackRates: [0.5, 1, 1.5, 2],
            userActions: { click: false } 
        });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { 
            document.getElementById('mainGrid').innerHTML = "<p style='text-align:center; width:100%; color:red;'>Failed to load channels. Please refresh.</p>";
        }
    }

    // [এখানে আপনার বাকি সব জাভাস্ক্রিপ্ট ফাংশন (parseM3U, setupGestures, playMain, etc.) আগের মতই থাকবে]
    // কোড ছোট করার জন্য আমি মূল লজিক ফাংশনগুলো এখানে সংক্ষেপ করছি, আপনি আগের কোড থেকে এগুলো এখানে বসিয়ে দেবেন।

    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        }, {passive: true});

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerHTML = `<i class="fas fa-sun"></i> ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerHTML = `<i class="fas fa-volume-up"></i> ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        }, {passive: true});

        wrapper.addEventListener('touchend', () => {
            if (!isMoving) {
                if (mainPlayer.paused()) mainPlayer.play();
                else mainPlayer.pause();
            }
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.length === 0 ? "<div style='grid-column:1/-1; color:gray; padding:50px; text-align:center;'>কোন চ্যানেল পাওয়া যায়নি</div>" : 
        list.map((ch, index) => {
            const isFav = favorites.includes(ch.id);
            return `
            <div class="card">
                <div class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${ch.id}')">
                    <i class="fas fa-star"></i>
                </div>
                <div class="logo-area" onclick="playMain('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=TV'">
                </div>
                <div class="ch-info" onclick="playMain('${ch.url}')">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    function playMain(url) {
        window.scrollTo({top: 0, behavior: 'smooth'});
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(() => {});
    }

    function toggleFav(event, id) {
        event.stopPropagation();
        if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
        event.currentTarget.classList.toggle('active');
        if (currentCategory === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
    }

    function filterCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cat === 'ALL') renderChannels(allChannels);
        else if (cat === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
        else renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase())));
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    function shareApp() {
        if (navigator.share) navigator.share({ title: 'Rivo TV', url: window.location.href });
        else alert("Link copied: " + window.location.href);
    }

    init();
</script>
</body>
</html>
