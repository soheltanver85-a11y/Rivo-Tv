<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
            --primary: #00f2ff;
            --grad-share: linear-gradient(45deg, #6a11cb, #2575fc);
            --grad-refresh: linear-gradient(45deg, #00b09b, #96c93d);
            --grad-tg: linear-gradient(45deg, #0088cc, #00c6ff);
            --grad-apk: linear-gradient(45deg, #f12711, #f5af19);
            --grad-full: linear-gradient(45deg, #00f2ff, #007adf);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 20px; }

        .brand-header { padding: 8px 15px; background: #000; border-bottom: 1px solid #111; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: var(--primary); }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .video-box { background: #000; border-bottom: 2px solid var(--primary); position: relative; overflow: hidden; touch-action: none; }
        .video-js { width: 100% !important; aspect-ratio: 16/9; }

        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 5; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 6px 12px; 
            border-radius: 20px; font-size: 11px; font-weight: bold; z-index: 100; 
            display: none; border: 1px solid var(--primary); pointer-events: none;
        }

        .notice-board { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; font-size: 11px; color: #aaa; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Action Buttons */
        .action-row { display: flex; gap: 6px; padding: 8px 10px; background: #080808; overflow-x: auto; scrollbar-width: none; }
        .action-row::-webkit-scrollbar { display: none; }
        .action-btn { padding: 5px 10px; border-radius: 6px; border: none; color: #fff; font-size: 10px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .btn-share { background: var(--grad-share); }
        .btn-refresh { background: var(--grad-refresh); }
        .btn-contact { background: var(--grad-tg); }
        .btn-apk { background: var(--grad-apk); }
        .btn-fullscreen { background: var(--grad-full); color: #000; }

        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { width: 100%; padding: 8px 15px; background: #111; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 12px; outline: none; border-left: 3px solid var(--primary); }

        /* Category Buttons - Adjusted Size */
        .cat-row { display: flex; gap: 10px; overflow-x: auto; padding: 12px 10px; scrollbar-width: none; background: #050505; border-bottom: 1px solid #111; }
        .cat-pill { padding: 8px 18px; background: #1a1a1a; border-radius: 8px; font-size: 12px; color: #bbb; white-space: nowrap; cursor: pointer; border: 1px solid #333; transition: 0.3s; font-weight: 600; }
        .cat-pill.active { background: var(--grad-full); color: #000; border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }

        /* Channel Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; transition: 0.3s; }
        
        /* Star (Favorite) Button */
        .fav-star { 
            position: absolute; top: 8px; right: 8px; z-index: 10; 
            background: rgba(0,0,0,0.6); padding: 5px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .fav-star i { font-size: 12px; color: #444; transition: 0.3s; }
        .fav-star.active i { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }

        .logo-area { height: 90px; background: #000; display: flex; align-items: center; justify-content: center; padding: 15px; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .ch-info { padding: 10px; background: #0d0d0d; border-top: 1px solid #1a1a1a; text-align: center; cursor: pointer; }
        .ch-name { font-size: 11px; font-weight: 600; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .footer-area { padding: 20px 0; text-align: center; background: #080808; border-top: 1px solid #111; margin-top: 15px; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="brand-header"><div class="brand-name">RIVO TV</div></div>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board"><div class="notice-text">📢 বাফারিং সমস্যা? নতুন চ্যানেল প্রয়োজন? দ্রুত সমাধান পেতে যুক্ত হোন আমাদের টেলিগ্রাম গ্রুপে। 🚀</div></div>

    <div class="action-row">
        <button class="action-btn btn-share" onclick="shareApp()"><i class="fas fa-share-nodes"></i> Share</button>
        <button class="action-btn btn-refresh" onclick="location.reload()"><i class="fas fa-rotate"></i> Refresh</button>
        <a href="https://t.me/techbd_group" target="_blank" class="action-btn btn-contact"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://www.mediafire.com/file/wm4p7mwuk2geuim/Rivo_Tv_1.0.0.apk/file" target="_blank" class="action-btn btn-apk"><i class="fas fa-download"></i> App</a>
        <button class="action-btn btn-fullscreen" onclick="goFullscreen()"><i class="fas fa-expand"></i> Full</button>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)">★ Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid"></div>

<div class="footer-area"><div class="dev-name">DEVELOPED BY SOHEL TANVEER</div></div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer;

    async function init() {
        mainPlayer = videojs('rivo-player', { fluid: true, controls: true, userActions: { click: false } });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("Load Error"); }
    }

    function goFullscreen() {
        if (mainPlayer.isFullscreen()) mainPlayer.exitFullscreen();
        else mainPlayer.requestFullscreen();
    }

    function setupGestures() {
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');
        let startY, startVal, isBrightness, isMoving = false;

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        });

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        });

        wrapper.addEventListener('touchend', () => {
            if (!isMoving) {
                if (mainPlayer.paused()) mainPlayer.play();
                else mainPlayer.pause();
            }
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}, list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map(ch => {
            const isFav = favorites.includes(ch.id);
            return `
            <div class="card">
                <div class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${ch.id}')">
                    <i class="fas fa-star"></i>
                </div>
                <div class="logo-area" onclick="playMain('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80x50?text=TV'">
                </div>
                <div class="ch-info" onclick="playMain('${ch.url}')">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleFav(event, id) {
        event.stopPropagation();
        if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
        event.currentTarget.classList.toggle('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cat === 'ALL') renderChannels(allChannels);
        else if (cat === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
        else renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase())));
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase();
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
    }

    function shareApp() {
        if (navigator.share) navigator.share({ title: 'Rivo TV', url: window.location.href });
        else alert("URL Copied!");
    }

    init();
</script>
</body>
</html>
