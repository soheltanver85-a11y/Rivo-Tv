<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --fire: #ff4500; 
            --telegram: #0088cc;
            --refresh: #00ff88;
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        /* Header Branding */
        .brand-header { 
            display: flex; 
            padding: 8px 12px; 
            background: #000;
        }
        .brand-name { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 16px; 
            font-weight: 900; 
            color: var(--primary); 
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
            letter-spacing: 1px;
        }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        
        .video-box { background: #000; border-bottom: 2px solid var(--primary); position: relative; overflow: hidden; touch-action: none; }
        .video-js { width: 100% !important; aspect-ratio: 16/9; }
        .vjs-loading-spinner { display: none !important; }

        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 15px; 
            border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 20; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 15px; }
        #bri-indicator { left: 15px; }

        /* Notice Board */
        .notice-board { background: #111; border-bottom: 1px solid #222; overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; font-size: 11px; color: #999; }
        .notice-text a { color: var(--primary); text-decoration: none; font-weight: 800; border: 1px solid var(--primary); padding: 1px 5px; border-radius: 3px; margin-left: 5px; font-size: 9px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Compact Action Row (Buttons) */
        .action-row { 
            display: flex; 
            gap: 6px; 
            padding: 6px 10px; 
            background: #080808; 
            overflow-x: auto; 
            scrollbar-width: none;
            align-items: center;
        }
        .action-row::-webkit-scrollbar { display: none; }

        .action-btn { 
            padding: 4px 8px; 
            background: #151515; 
            border-radius: 4px; 
            border: 1px solid #252525; 
            color: #ccc; 
            font-size: 10px; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            white-space: nowrap; 
            transition: 0.2s;
        }
        .action-btn i { font-size: 11px; }
        .btn-share { color: #fff; background: #222; }
        .btn-refresh { color: var(--refresh); border-color: rgba(0, 255, 136, 0.3); }
        .btn-contact { color: var(--telegram); border-color: rgba(0, 136, 204, 0.3); }
        .btn-apk { color: var(--fire); border-color: rgba(255, 69, 0, 0.3); font-weight: bold; }
        .btn-fullscreen { background: var(--primary); color: #000; border: none; font-weight: 800; }

        /* Search Area */
        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { 
            width: 100%; 
            padding: 7px 12px; 
            background: #121212; 
            border: 1px solid #222; 
            border-radius: 6px; 
            color: #fff; 
            font-size: 11px; 
            outline: none; 
            border-left: 2px solid var(--primary); 
        }

        /* Compact Category Row */
        .cat-row { 
            display: flex; 
            gap: 5px; 
            overflow-x: auto; 
            padding: 6px 10px; 
            scrollbar-width: none; 
            background: #050505; 
            border-bottom: 1px solid #111;
        }
        .cat-pill { 
            padding: 4px 10px; 
            background: #121212; 
            border-radius: 4px; 
            font-size: 10px; 
            color: #888; 
            white-space: nowrap; 
            cursor: pointer; 
            border: 1px solid #222; 
        }
        .cat-pill.active { 
            background: rgba(0, 242, 255, 0.1); 
            color: var(--primary); 
            border-color: var(--primary); 
            font-weight: 600; 
        }

        /* Channel Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        .logo-area { height: 85px; background: #000; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ch-info { padding: 6px; background: #0d0d0d; border-top: 1px solid #1a1a1a; cursor: pointer; text-align: center; }
        .ch-name { font-size: 10px; font-weight: 600; color: #ddd; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fav-star { position: absolute; top: 6px; right: 6px; z-index: 20; padding: 4px; cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; }
        .fav-star svg { fill: #444; width: 12px; height: 12px; }
        .fav-star.active svg { fill: #ffcc00; }

        .footer-area { padding: 15px 0; text-align: center; border-top: 1px solid #1a1a1a; margin-top: 15px; background: #080808; }
        .dev-title { font-size: 8px; color: #555; text-transform: uppercase; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 800; color: #888; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-name">RIVO TV</div>
</div>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">
            📢 বাফারিং সমস্যা? নতুন চ্যানেল প্রয়োজন? দ্রুত সমাধান পেতে যুক্ত হোন 
            <a href="https://t.me/techbd_group" target="_blank">𝚃𝚎𝚌𝚑 𝙱𝙳</a>
        </div>
    </div>

    <div class="action-row">
        <button class="action-btn btn-share" onclick="shareApp()"><i class="fas fa-share-nodes"></i> Share</button>
        <button class="action-btn btn-refresh" onclick="location.reload()"><i class="fas fa-rotate"></i> Refresh</button>
        <a href="https://t.me/techbd_group" target="_blank" class="action-btn btn-contact"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://www.mediafire.com/file/wm4p7mwuk2geuim/Rivo_Tv_1.0.0.apk/file" target="_blank" class="action-btn btn-apk"><i class="fas fa-download"></i> Get App</a>
        <button class="action-btn btn-fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i> Fullscreen</button>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="চ্যানেল খুঁজুন..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)">Favorites</div>
    </div>
</div>

<div class="grid" id="mainGrid">Loading...</div>

<div class="footer-area">
    <div class="dev-title">Managed By</div>
    <div class="dev-name">Sohel Tanvir</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer;
    let currentCategory = 'ALL';

    async function init() {
        mainPlayer = videojs('rivo-player', { fluid: true, userActions: { click: false } });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("M3U Load Error"); }
    }

    function toggleFullscreen() {
        const player = document.getElementById('rivo-player');
        if (!document.fullscreenElement) {
            if (player.requestFullscreen) player.requestFullscreen();
            else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => {});
            }
        } else {
            document.exitFullscreen();
        }
    }

    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        }, {passive: true});

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        }, {passive: true});

        wrapper.addEventListener('touchend', () => {
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.length === 0 ? "<div style='grid-column:1/-1; color:gray; padding:40px; text-align:center; font-size:12px;'>No Channels Found</div>" : 
        list.map((ch, index) => {
            const isFav = favorites.includes(ch.id);
            return `
            <div class="card">
                <div class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${ch.id}')">
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </div>
                <div class="logo-area" onclick="playMain('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                </div>
                <div class="ch-info" onclick="playMain('${ch.url}')">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(() => {});
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleFav(event, id) {
        event.stopPropagation();
        if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
        event.currentTarget.classList.toggle('active');
        if (currentCategory === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
    }

    function filterCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("search-input").value = "";
        
        if (cat === 'ALL') renderChannels(allChannels);
        else if (cat === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
        else renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase())));
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        if (query === "") {
            filterCat(currentCategory, document.querySelector('.cat-pill.active'));
            return;
        }
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    function shareApp() {
        if (navigator.share) {
            navigator.share({ title: 'Rivo TV', url: window.location.href });
        } else {
            alert("লিঙ্ক কপি করা হয়েছে!");
        }
    }

    init();
</script>
</body>
</html>
