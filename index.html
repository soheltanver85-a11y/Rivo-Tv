<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Final Fix</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; }

        /* প্রধান সমাধান: ভিডিও কন্টেইনার */
        .video-box { 
            background: #000; 
            border-bottom: 2px solid var(--primary); 
            position: relative; 
            width: 100%;
            /* ১৬:৯ রেশিও লক করা */
            aspect-ratio: 16 / 9; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .video-js { 
            width: 100% !important; 
            height: 100% !important;
        }

        /* ভিডিও কোনোভাবেই চ্যাপ্টা হবে না */
        .vjs-tech { 
            object-fit: contain !important; 
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
        }

        /* ফুলস্ক্রিন বা অটো-রোটেশন ফিক্স */
        video:fullscreen, .vjs-fullscreen .vjs-tech {
            object-fit: contain !important;
        }

        /* গেসচার ইন্ডিকেটর এবং অন্যান্য */
        .vjs-loading-spinner { display: none !important; }
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 10px 20px; 
            border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 20; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 20px; }
        #bri-indicator { left: 20px; }

        /* UI এলিমেন্টগুলো */
        .notice-board { background: #111; padding: 5px 0; overflow: hidden; white-space: nowrap; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 11px; color: #bbb; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #080808; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--primary); }
        
        .action-row { display: flex; gap: 5px; }
        .action-btn { padding: 5px 10px; background: #1a1a1a; border-radius: 5px; border: 1px solid #333; color: #bbb; font-size: 10px; cursor: pointer; text-decoration: none; }

        .search-area { padding: 10px; }
        .search-input { width: 100%; padding: 10px; background: #121212; border: 1px solid #222; border-radius: 6px; color: #fff; font-size: 12px; outline: none; }

        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px; scrollbar-width: none; }
        .cat-pill { padding: 6px 15px; background: #1a1a1a; border-radius: 20px; font-size: 11px; color: #aaa; white-space: nowrap; cursor: pointer; border: 1px solid #333; }
        .cat-pill.active { background: var(--primary); color: #000; font-weight: bold; }

        /* চ্যানেল গ্রিড */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        .logo-area { height: 100px; background: #000; display: flex; align-items: center; justify-content: center; padding: 15px; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ch-info { padding: 10px; background: #0d0d0d; text-align: center; border-top: 1px solid #1a1a1a; }
        .ch-name { font-size: 11px; font-weight: 600; color: #eee; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">📢 Rivo TV-তে স্বাগতম! ভিডিও বাফারিং হলে রিফ্রেশ বাটন চাপুন। নতুন চ্যানেল নিয়মিত আপডেট করা হচ্ছে।</div>
    </div>

    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div class="action-row">
            <button class="action-btn" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
            <a href="https://t.me/techbd_group" target="_blank" class="action-btn">Telegram</a>
        </div>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="চ্যানেল খুঁজুন..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All Channels</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
    </div>
</div>

<div class="grid" id="mainGrid">Loading...</div>

<div class="footer-area" style="text-align: center; padding: 20px; color: #444; font-size: 10px;">
    Developed by Sohel Tanvir
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], mainPlayer;

    async function init() {
        // ভিডিও প্লেয়ার সেটআপ
        mainPlayer = videojs('rivo-player', {
            autoplay: false,
            controls: true,
            responsive: true,
            fluid: false, // Fluid false রেখে CSS দিয়ে রেশিও কন্ট্রোল করা হচ্ছে
            userActions: { click: true }
        });

        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("M3U Error"); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map((ch) => `
            <div class="card" onclick="playMain('${ch.url}')">
                <div class="logo-area">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80?text=TV'">
                </div>
                <div class="ch-info">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // গেসচার কন্ট্রোল
    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        });

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 200;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        });

        wrapper.addEventListener('touchend', () => {
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 1000);
        });
    }

    function liveSearch() {
        const q = document.getElementById("search-input").value.toLowerCase();
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(q)));
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = (cat === 'ALL') ? allChannels : allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase()));
        renderChannels(filtered);
    }

    init();
</script>
</body>
</html>
