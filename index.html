<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Optimized Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --fire: #ff4500; 
            --telegram: #0088cc;
            --refresh: #00ff88;
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
            --accent: #ff4081;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { background-color: var(--bg); color: var(--text); overflow-x: hidden; width: 100%; height: 100%; }

        /* 📺 Top Fixed Section (Avia TV Style) */
        #top-section { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 1000; border-bottom: 1px solid #222; }

        /* 📱 Video Player Container */
        .video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            max-width: 1200px; 
            margin: 0 auto; 
            background: #000; 
            overflow: hidden; 
            touch-action: none; 
        }
        
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* 🖥️ Fullscreen Optimization */
        .vjs-fullscreen #brand-header, 
        .vjs-fullscreen .notice-board, 
        .vjs-fullscreen header, 
        .vjs-fullscreen .search-area,
        .vjs-fullscreen .cat-row { display: none !important; }

        .video-js .vjs-tech { object-fit: contain !important; }

        /* Gesture Indicators */
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 2147483647; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 12px 20px; 
            border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 2147483647; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 20px; }
        #bri-indicator { left: 20px; }

        /* Header Styles */
        .brand-header { padding: 10px 15px; background: #080808; display: flex; align-items: center; justify-content: space-between; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }

        .notice-board { background: #111; border-bottom: 1px solid #222; overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 11px; color: #aaa; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        header { padding: 10px 12px; background: #080808; }
        .action-btns { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; justify-content: space-between; }
        .rect-btn { flex: 1; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 16px; outline: none; background: #1a1a1a; color: #fff; text-decoration: none; }
        
        .btn-refresh { color: var(--refresh); border-color: var(--refresh); background: rgba(0, 255, 136, 0.05); }
        .btn-tg { color: var(--telegram); border-color: var(--telegram); background: rgba(0, 136, 204, 0.05); }
        .btn-rotate { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }

        .search-area { padding: 0 12px 10px 12px; display: flex; gap: 8px; align-items: center; }
        .search-input { flex: 1; padding: 8px 12px; background: #121212; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 12px; outline: none; }
        #count-badge { font-size: 10px; color: var(--primary); font-weight: bold; background: rgba(0, 242, 255, 0.1); padding: 4px 8px; border-radius: 4px; }

        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding: 0 12px 10px 12px; scrollbar-width: none; }
        .cat-pill { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #bbb; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .cat-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 📱 Content Area (Below Fixed Top) */
        #content-area { margin-top: 280px; padding-bottom: 50px; } /* dynamically adjusted by JS */

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 12px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .fav-star { position: absolute; top: 6px; right: 8px; font-size: 18px; color: rgba(255,255,255,0.2); z-index: 10; }
        .fav-star.active { color: #ffcc00; }
        .channel-logo { height: 35px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
        .channel-name { font-size: 10px; color: #ccc; pointer-events: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .footer-area { padding: 30px 0; text-align: center; border-top: 1px solid #1a1a1a; }
        .dev-info { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); } }
    </style>
</head>
<body>

<div id="top-section">
    <div id="brand-header" class="brand-header">
        <div class="brand-name">RIVO TV</div>
    </div>

    <div class="notice-board">
        <div class="notice-text">
            📢 বর্তমানে আপনি সেরা স্ট্রিমিং সার্ভারে যুক্ত আছেন। কোনো চ্যানেল না চললে রিফ্রেশ দিন। সাপোর্ট: <span style="color:var(--primary)">TECH BD</span>
        </div>
    </div>

    <div class="video-container" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <header>
        <div class="action-btns">
            <button class="rect-btn btn-refresh" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
            <a href="https://t.me/techbd_group" target="_blank" class="rect-btn btn-tg"><i class="fab fa-telegram-plane"></i></a>
            <button class="rect-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i></button>
            <button class="rect-btn btn-rotate" onclick="toggleRotateManual()"><i class="fas fa-expand"></i></button>
        </div>
        
        <div class="search-area">
            <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
            <span id="count-badge">0 CH</span>
        </div>

        <div class="cat-row">
            <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
            <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
            <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
            <div class="cat-pill" style="color:#ffcc00" onclick="filterCat('Fav', this)">★ Favorites</div>
        </div>
    </header>
</div>

<div id="content-area">
    <div class="grid" id="mainGrid">লোডিং...</div>
    <div class="footer-area">
        <div class="dev-info">Developed By Sohel Tanvir</div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer;
    let currentCategory = 'ALL';

    async function init() {
        mainPlayer = videojs('rivo-player', { 
            fluid: true, 
            aspectRatio: '16:9',
            userActions: { click: false }
        });
        
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            
            // Adjust content area margin
            setInterval(() => {
                const topH = document.getElementById('top-section').offsetHeight;
                document.getElementById('content-area').style.marginTop = topH + 'px';
            }, 500);

            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("M3U Load Error"); }
    }

    function setupGestures() {
        let startY, startVal, isBrightness, isMoving = false;
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');

        mainPlayer.on('ready', () => {
            const el = mainPlayer.el();
            el.appendChild(briOverlay);
            el.appendChild(volInd);
            el.appendChild(briInd);
        });

        wrapper.addEventListener('touchstart', (e) => {
            isMoving = false; startY = e.touches[0].pageY;
            const x = e.touches[0].pageX - wrapper.getBoundingClientRect().left;
            isBrightness = x < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        }, {passive: true});

        wrapper.addEventListener('touchmove', (e) => {
            isMoving = true;
            const diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        }, {passive: true});

        wrapper.addEventListener('touchend', () => {
            if (!isMoving) {
                if (mainPlayer.paused()) mainPlayer.play();
                else mainPlayer.pause();
            }
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.id = btoa(unescape(encodeURIComponent(item.name || "")));
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.length === 0 ? "<div style='grid-column:1/-1; color:gray; padding:20px; text-align:center;'>চ্যানেল পাওয়া যায়নি</div>" : 
        list.map(ch => {
            const isFav = favorites.includes(ch.id);
            return `
            <div class="card" onclick="playMain('${ch.url}')">
                <span class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${ch.id}')">★</span>
                <img src="${ch.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/50?text=TV'">
                <div class="channel-name">${ch.name}</div>
            </div>`;
        }).join('');
        document.getElementById("count-badge").innerText = list.length + " CH";
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(() => {});
    }

    function toggleFav(event, id) {
        event.stopPropagation();
        if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
        event.currentTarget.classList.toggle('active');
        if (currentCategory === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
    }

    function filterCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("search-input").value = "";
        
        if (cat === 'ALL') renderChannels(allChannels);
        else if (cat === 'Fav') renderChannels(allChannels.filter(ch => favorites.includes(ch.id)));
        else renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase())));
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        if (query === "") {
            filterCat(currentCategory, document.querySelector('.cat-pill.active'));
            return;
        }
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
    }

    function toggleRotateManual() {
        if (!mainPlayer.isFullscreen()) {
            mainPlayer.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        } else {
            mainPlayer.exitFullscreen();
        }
    }

    function shareApp() {
        if (navigator.share) navigator.share({ title: 'Rivo TV', url: window.location.href });
        else alert("Link: " + window.location.href);
    }

    init();
</script>
</body>
</html>
