<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        /* ১. ভিডিও বক্স এবং প্লেয়ার ফিক্স */
        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; }
        .video-box { 
            background: #000; 
            border-bottom: 2px solid var(--primary); 
            position: relative; 
            overflow: hidden; 
            width: 100%;
        }
        
        .video-js { 
            width: 100% !important; 
            height: auto !important; 
            aspect-ratio: 16/9; /* এটি ভিডিওর আসল অনুপাত রাখবে */
        }

        /* ২. ভিডিও স্ট্রেচ বা জুম বন্ধ করার প্রধান কোড */
        .vjs-tech { 
            object-fit: contain !important; /* ভিডিও কাটবে না, কালো বর্ডার থাকলেও পুরো ভিডিও দেখাবে */
        }

        /* ৩. ফুলস্ক্রিন বা রোটেশন অবস্থায় যাতে জুম না হয় */
        video:fullscreen, 
        video:-webkit-full-screen,
        .vjs-fullscreen .vjs-tech { 
            object-fit: contain !important; 
        }

        .notice-board { background: #111; padding: 5px 0; overflow: hidden; white-space: nowrap; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 11px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: #080808; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: var(--primary); }
        
        .action-row { display: flex; gap: 4px; overflow-x: auto; }
        .action-btn { padding: 4px 8px; background: #1a1a1a; border-radius: 5px; border: 1px solid #333; color: #bbb; font-size: 10px; cursor: pointer; text-decoration: none; }

        .search-area { padding: 0 10px 8px 10px; }
        .search-input { width: 100%; padding: 7px 12px; background: #121212; border: 1px solid #222; border-radius: 6px; color: #fff; font-size: 11px; outline: none; }

        .cat-row { display: flex; gap: 6px; overflow-x: auto; padding: 7px 10px; }
        .cat-pill { padding: 4px 12px; background: #1a1a1a; border-radius: 5px; font-size: 10px; color: #aaa; white-space: nowrap; border: 1px solid #333; }
        .cat-pill.active { background: rgba(0, 242, 255, 0.15); color: var(--primary); border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        .logo-area { height: 90px; background: #000; display: flex; align-items: center; justify-content: center; padding: 12px; position: relative; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ch-info { padding: 7px; background: #0d0d0d; text-align: center; cursor: pointer; }
        .ch-name { font-size: 10px; font-weight: 600; color: #eee; }

        .footer-area { padding: 12px 0; text-align: center; border-top: 1px solid #1a1a1a; margin-top: 10px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="notice-board">
        <div class="notice-text">📢 বাফারিং সমস্যা হলে রিফ্রেশ করুন। নতুন চ্যানেল আপডেট পেতে যুক্ত হোন Telegram-এ।</div>
    </div>

    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div class="action-row">
            <button class="action-btn" onclick="location.reload()">Refresh</button>
            <a href="https://t.me/techbd_group" class="action-btn">Telegram</a>
        </div>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
    </div>
</div>

<div class="grid" id="mainGrid">Loading...</div>

<div class="footer-area">
    <div style="font-size: 10px; color: #888;">Developed By Sohel Tanvir</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], mainPlayer;

    async function init() {
        mainPlayer = videojs('rivo-player', { 
            fluid: true, 
            responsive: true,
            // ৪. প্লেয়ার যাতে ভিডিও স্ট্রেচ না করে সেজন্য নিচের অংশটুকু
            playbackRates: [1],
            controlBar: {
                pictureInPictureToggle: false
            }
        });

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("Error loading channels"); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map((ch) => `
            <div class="card" onclick="playMain('${ch.url}')">
                <div class="logo-area">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80?text=TV'">
                </div>
                <div class="ch-info">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(() => {});
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function liveSearch() {
        const query = document.getElementById("search-input").value.toLowerCase();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = (cat === 'ALL') ? allChannels : allChannels.filter(ch => ch.name.toLowerCase().includes(cat.toLowerCase()));
        renderChannels(filtered);
    }

    init();
</script>
</body>
</html>
