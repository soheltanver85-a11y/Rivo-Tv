<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Pro Style</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        
        .video-box { 
            background: #000; 
            border-bottom: 2px solid var(--primary); 
            position: relative; 
            width: 100%;
            aspect-ratio: 16/9; 
        }
        
        .video-js { width: 100% !important; height: 100% !important; }

        /* Gesture Indicators */
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10; }
        .gesture-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 15px; 
            border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 100; 
            display: none; pointer-events: none; border: 1px solid var(--primary); 
        }
        #vol-indicator { right: 15px; }
        #bri-indicator { left: 15px; }

        /* Header & Search */
        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #080808; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary); font-weight: 900; }
        .search-area { padding: 0 10px 10px; background: #080808; }
        .search-input { width: 100%; padding: 8px; background: #121212; border: 1px solid #222; border-radius: 5px; color: #fff; font-size: 12px; }

        /* Category */
        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px; scrollbar-width: none; background: #050505; border-bottom: 1px solid #1a1a1a; }
        .cat-pill { padding: 5px 15px; background: #1a1a1a; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; color: #888; border: 1px solid #333; }
        .cat-pill.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border-color: var(--primary); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        
        .logo-area { height: 90px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
        .logo-area img { max-height: 70%; max-width: 80%; object-fit: contain; }
        
        /* Preview Player Style */
        .preview-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; z-index: 5; }
        .card.playing-preview .preview-container { display: block; }
        .card.playing-preview img { display: none; }

        /* Favorite Star */
        .fav-star { position: absolute; top: 8px; right: 8px; color: rgba(255,255,255,0.2); font-size: 16px; z-index: 10; transition: 0.3s; cursor: pointer; }
        .fav-star.active { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }

        .ch-info { padding: 8px; background: #0d0d0d; border-top: 1px solid #1a1a1a; text-align: center; cursor: pointer; }
        .ch-name { font-size: 11px; font-weight: 600; color: #ddd; display: block; }
        .ch-name:active { color: var(--primary); }

        .footer-area { padding: 20px; text-align: center; color: #444; font-size: 10px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>

    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div style="display: flex; gap: 5px;">
            <button class="cat-pill" style="padding: 4px 10px;" onclick="location.reload()">Refresh</button>
        </div>
    </div>
    
    <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()">
    </div>

    <div class="cat-row">
        <div class="cat-pill active" onclick="filterCat('ALL', this)">All</div>
        <div class="cat-pill" onclick="filterCat('Fav', this)">★ Favorites</div>
        <div class="cat-pill" onclick="filterCat('Sports', this)">Sports</div>
        <div class="cat-pill" onclick="filterCat('Bangla', this)">Bangla</div>
    </div>
</div>

<div class="grid" id="mainGrid"></div>

<div class="footer-area">Developed By Sohel Tanvir</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [], favorites = JSON.parse(localStorage.getItem('rivo_favs')) || [];
    let mainPlayer;

    async function init() {
        mainPlayer = videojs('rivo-player', { fluid: true, aspectRatio: '16:9' });
        setupGestures();

        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error("Error loading M3U"); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}; let list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                item.cat = l.match(/group-title="(.*?)"/)?.[1] || "Bangla";
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = list.map((ch, index) => {
            const isFav = favorites.includes(ch.url) ? 'active' : '';
            return `
            <div class="card" id="card-${index}">
                <i class="fas fa-star fav-star ${isFav}" onclick="toggleFavorite(event, '${ch.url}')"></i>
                <div class="logo-area" onclick="playMain('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'">
                    <div class="preview-container" id="preview-container-${index}"></div>
                </div>
                <div class="ch-info" onclick="startChannelPreview('${ch.url}', ${index})">
                    <span class="ch-name">${ch.name}</span>
                </div>
            </div>`;
        }).join('');
    }

    // ১০ সেকেন্ডের লাইভ প্রিভিউ ফাংশন
    function startChannelPreview(url, index) {
        const card = document.getElementById(`card-${index}`);
        const container = document.getElementById(`preview-container-${index}`);
        
        // প্রিভিউ প্লেয়ার তৈরি
        card.classList.add('playing-preview');
        container.innerHTML = `<video id="pv-${index}" class="video-js" muted playsinline style="width:100%;height:100%"></video>`;
        
        let pPlayer = videojs(`pv-${index}`, { autoplay: true, controls: false });
        pPlayer.src({ src: url, type: 'application/x-mpegURL' });

        // ১০ সেকেন্ড পর বন্ধ করা
        setTimeout(() => {
            pPlayer.dispose();
            container.innerHTML = "";
            card.classList.remove('playing-preview');
        }, 10000);
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleFavorite(event, url) {
        event.stopPropagation();
        const icon = event.currentTarget;
        const index = favorites.indexOf(url);
        if (index > -1) {
            favorites.splice(index, 1);
            icon.classList.remove('active');
        } else {
            favorites.push(url);
            icon.classList.add('active');
        }
        localStorage.setItem('rivo_favs', JSON.stringify(favorites));
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        if (cat === 'Fav') {
            renderChannels(allChannels.filter(ch => favorites.includes(ch.url)));
        } else if (cat === 'ALL') {
            renderChannels(allChannels);
        } else {
            renderChannels(allChannels.filter(ch => ch.cat.includes(cat)));
        }
    }

    function liveSearch() {
        const q = document.getElementById("search-input").value.toLowerCase();
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(q)));
    }

    // Brightness & Volume Gestures
    function setupGestures() {
        const wrapper = document.getElementById('player-wrapper');
        const briOverlay = document.getElementById('brightness-overlay');
        const volInd = document.getElementById('vol-indicator');
        const briInd = document.getElementById('bri-indicator');
        let startY, startVal, isBrightness;

        wrapper.addEventListener('touchstart', (e) => {
            startY = e.touches[0].pageY;
            isBrightness = e.touches[0].pageX < wrapper.offsetWidth / 2;
            startVal = isBrightness ? (1 - parseFloat(briOverlay.style.opacity || 0)) : mainPlayer.volume();
        });

        wrapper.addEventListener('touchmove', (e) => {
            let diff = (startY - e.touches[0].pageY) / 150;
            let newVal = Math.min(Math.max(startVal + diff, 0), 1);
            if (isBrightness) {
                briOverlay.style.opacity = 1 - newVal;
                briInd.innerText = `☀️ ${Math.round(newVal * 100)}%`;
                briInd.style.display = 'block';
            } else {
                mainPlayer.volume(newVal);
                volInd.innerText = `🔊 ${Math.round(newVal * 100)}%`;
                volInd.style.display = 'block';
            }
        });

        wrapper.addEventListener('touchend', () => {
            setTimeout(() => { volInd.style.display = 'none'; briInd.style.display = 'none'; }, 800);
        });
    }

    init();
</script>
</body>
</html>
