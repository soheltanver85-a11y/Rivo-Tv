<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Rivo TV | Premium Live Streaming</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .fixed-top-container { position: sticky; top: 0; z-index: 2000; background: var(--bg); width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .video-box { background: #000; border-bottom: 2px solid var(--primary); position: relative; overflow: hidden; }
        
        /* ⚡ ভিডিও সাইজ ফিক্স করার মূল CSS ⚡ */
        .video-js { 
            width: 100% !important; 
            aspect-ratio: 16/9 !important; 
            background-color: #000 !important; 
        }

        /* সাধারণ অবস্থায় ভিডিও */
        .video-js .vjs-tech {
            object-fit: contain !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* 🔴 ফুলস্ক্রিন অবস্থায় ভিডিও ছোট রাখার টেকনিক 🔴 */
        .video-js.vjs-fullscreen .vjs-tech {
            object-fit: contain !important;
            width: 90% !important;  /* ভিডিওর চওড়া ১০% কমানো হয়েছে */
            height: 90% !important; /* ভিডিওর উচ্চতা ১০% কমানো হয়েছে */
            margin: auto !important; /* মাঝখানে রাখার জন্য */
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
        }

        .vjs-loading-spinner { display: none !important; }
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 10; }
        .gesture-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); color: var(--primary); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 20; display: none; pointer-events: none; border: 1px solid var(--primary); }
        #vol-indicator { right: 20px; }
        #bri-indicator { left: 20px; }

        /* Notice & Header Styles */
        .notice-board { background: #111; border-bottom: 1px solid #222; overflow: hidden; white-space: nowrap; padding: 5px 0; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 11px; color: #bbb; }
        .notice-text a { color: var(--primary); text-decoration: none; font-weight: 800; font-family: 'Orbitron', sans-serif; border: 1px solid var(--primary); padding: 1px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; font-size: 10px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .header-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: #080808; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--primary); }
        .action-row { display: flex; gap: 4px; overflow-x: auto; }
        .action-btn { padding: 4px 8px; background: #1a1a1a; border-radius: 5px; border: 1px solid #333; color: #bbb; font-size: 10px; text-decoration: none; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

        .search-area { padding: 0 10px 8px 10px; background: #080808; }
        .search-input { width: 100%; padding: 7px 12px; background: #121212; border: 1px solid #222; border-radius: 6px; color: #fff; font-size: 11px; outline: none; }

        .cat-row { display: flex; gap: 6px; overflow-x: auto; padding: 7px 10px; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .cat-pill { padding: 4px 12px; background: #1a1a1a; border-radius: 5px; font-size: 10px; color: #aaa; white-space: nowrap; cursor: pointer; }
        .cat-pill.active { background: rgba(0, 242, 255, 0.15); color: var(--primary); border-color: var(--primary); border: 1px solid; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        .logo-area { height: 90px; background: #000; display: flex; align-items: center; justify-content: center; padding: 12px; position: relative; cursor: pointer; }
        .logo-area img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ch-info { padding: 7px; background: #0d0d0d; border-top: 1px solid #1a1a1a; }
        .ch-name { font-size: 10px; font-weight: 600; color: #eee; }

        .footer-area { padding: 12px 0; text-align: center; border-top: 1px solid #1a1a1a; background: #080808; }
        .dev-name { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #888; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="fixed-top-container">
    <div class="video-box" id="player-wrapper">
        <video id="rivo-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div id="brightness-overlay"></div>
        <div id="vol-indicator" class="gesture-indicator">🔊 100%</div>
        <div id="bri-indicator" class="gesture-indicator">☀️ 100%</div>
    </div>
    <div class="notice-board"><div class="notice-text">📢 বাফারিং হলে রিফ্রেশ করুন। নতুন চ্যানেল চাইলে টেলিগ্রামে জানান।</div></div>
    <div class="header-row">
        <div class="brand-name">RIVO TV</div>
        <div class="action-row">
            <button class="action-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <a href="https://t.me/techbd_group" class="action-btn">Telegram</a>
        </div>
    </div>
    <div class="search-area"><input type="text" id="search-input" class="search-input" placeholder="সার্চ চ্যানেল..." oninput="liveSearch()"></div>
</div>

<div class="grid" id="mainGrid">Loading...</div>

<div class="footer-area"><div class="dev-name">Developed By Sohel Tanvir</div></div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const M3U_URL = "https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/main/Live-tv2";
    let allChannels = [];
    let mainPlayer;

    async function init() {
        mainPlayer = videojs('rivo-player', { fluid: true, fill: true });
        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            allChannels = parseM3U(data);
            renderChannels(allChannels);
            if(allChannels.length > 0) playMain(allChannels[0].url);
        } catch (e) { console.error(e); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let item = {}, list = [];
        lines.forEach(l => {
            if (l.startsWith('#EXTINF')) {
                item.name = l.split(',')[1]?.trim();
                item.logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
            } else if (l.startsWith('http')) {
                item.url = l.trim();
                if(item.name) list.push({...item});
                item = {};
            }
        });
        return list;
    }

    function renderChannels(list) {
        document.getElementById('mainGrid').innerHTML = list.map(ch => `
            <div class="card" onclick="playMain('${ch.url}')">
                <div class="logo-area"><img src="${ch.logo}"></div>
                <div class="ch-info"><span class="ch-name">${ch.name}</span></div>
            </div>`).join('');
    }

    function playMain(url) {
        mainPlayer.src({ src: url, type: 'application/x-mpegURL' });
        mainPlayer.play().catch(()=>{});
    }

    function liveSearch() {
        const q = document.getElementById("search-input").value.toLowerCase();
        renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(q)));
    }

    init();
</script>
</body>
</html>
